<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MCC-MRF Innovation Park</title>
<script>
  // SPA redirect for GitHub Pages / static hosting
  // Redirects all 404s to index.html with the path preserved
  var pathSegments = window.location.pathname.split('/').filter(Boolean);
  var query = window.location.search;
  window.location.replace(
    window.location.origin + '/?p=/' + pathSegments.join('/') + query
  );
</script>
</head>
<body>
  Redirecting...
</body>
</html>
